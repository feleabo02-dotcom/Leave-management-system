name: Production Deployment

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Environment Setup
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4' # Match this to your server exactly
          extensions: mbstring, dom, fileinfo, pdo_mysql, bcmath
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 2. Install & Build (Production Optimized)
      - name: Install Dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci
          npm run build

      # 3. Secure Environment Configuration
      - name: Create .env
        run: |
          echo "${{ secrets.PROD_ENV_FILE }}" > .env
          # Use a static key from secrets instead of generating a new one
          # To ensure sessions persist across deployments

      # 4. Prepare Atomic Deployment Directory
      # This moves the 'public' content to 'htdocs' while keeping the core separate
      - name: Stage Deployment
        run: |
          mkdir -p build_dir/htdocs
          mkdir -p build_dir/core
          
          # Move public contents to htdocs
          cp -r public/* build_dir/htdocs/
          cp public/.htaccess build_dir/htdocs/
          
          # Move core files to core (excluding sensitive/unnecessary data)
          rsync -av --progress . build_dir/core --exclude public --exclude .git --exclude .github --exclude node_modules --exclude tests

      # 5. Professional index.php Routing
      # Points the public index to the core directory
      - name: Patch index.php
        run: |
          cat > build_dir/htdocs/index.php << 'EOF'
          <?php
          define('LARAVEL_START', microtime(true));
          require __DIR__.'/../core/vendor/autoload.php';
          $app = require_once __DIR__.'/../core/bootstrap/app.php';
          $kernel = $app->make(Illuminate\Contracts\Http\Kernel::class);
          $response = $kernel->handle(
              $request = Illuminate\Http\Request::capture()
          );
          $response->send();
          $kernel->terminate($request, $response);
          EOF

      - name: Detect Composer dependency changes
        id: dependency_changes
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "composer_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$BEFORE_SHA" "${{ github.sha }}" | grep -Eq '^composer\.(json|lock)$'; then
            echo "composer_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "composer_changed=false" >> "$GITHUB_OUTPUT"
          fi

      # 6. Smart Sync Deployment
      - name: Deploy to InfinityFree (with vendor updates)
        if: steps.dependency_changes.outputs.composer_changed == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: build_dir/
          server-dir: ./
          # This ensures we don't delete logs or user uploads on the server
          dangerous-clean-slate: false
          exclude: |
            **/.env
            core/storage/logs/**
            core/storage/framework/cache/**
            core/storage/framework/sessions/**

      - name: Deploy to InfinityFree (skip vendor upload)
        if: steps.dependency_changes.outputs.composer_changed == 'false'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: build_dir/
          server-dir: ./
          # This ensures we don't delete logs or user uploads on the server
          dangerous-clean-slate: false
          exclude: |
            **/.env
            core/vendor/**
            core/storage/logs/**
            core/storage/framework/cache/**
            core/storage/framework/sessions/**
