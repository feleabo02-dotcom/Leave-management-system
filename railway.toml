[build]
builder = "nixpacks"
buildCommand = "composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev -COMPOSER_ALLOW_SUPERUSER=1 && npm ci && npm run build"
cacheDirectories = ["vendor", "node_modules"]

[deploy]
startCommand = "php artisan migrate --force --no-interaction && php artisan config:cache && php artisan route:cache && vendor/bin/heroku-php-apache2 public/"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
